<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for elegant styling -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6c866;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8941f;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2c1810;stop-opacity:0.1" />
    </linearGradient>
    
    <!-- Filters for effects -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#2c1810" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle with subtle gradient -->
  <circle cx="60" cy="60" r="58" fill="url(#shadowGradient)" opacity="0.1"/>
  
  <!-- Main logo circle -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="url(#goldGradient)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Restaurant name initials "BV" stylized -->
  <g filter="url(#shadow)">
    <!-- Letter B -->
    <path d="M25 35 L25 85 L40 85 Q48 85 48 78 Q48 71 43 68 Q48 65 48 58 Q48 51 40 51 L25 51 Z M32 58 L32 44 L38 44 Q41 44 41 51 Q41 58 38 58 Z M32 65 L32 78 L39 78 Q42 78 42 71.5 Q42 65 39 65 Z" 
          fill="url(#goldGradient)" stroke="#b8941f" stroke-width="1"/>
    
    <!-- Letter V -->
    <path d="M55 35 L68 75 L75 75 L88 35 L81 35 L71.5 65 L61.5 35 Z" 
          fill="url(#goldGradient)" stroke="#b8941f" stroke-width="1"/>
  </g>
  
  <!-- Decorative elements - chef's hat icon above letters -->
  <g transform="translate(60, 25)" filter="url(#glow)">
    <ellipse cx="0" cy="8" rx="12" ry="6" fill="url(#goldGradient)" opacity="0.8"/>
    <path d="M-10 8 Q-10 2 -5 2 Q-2 -2 0 -2 Q2 -2 5 2 Q10 2 10 8 L10 12 Q10 14 8 14 L-8 14 Q-10 14 -10 12 Z" 
          fill="url(#goldGradient)" opacity="0.8"/>
    <circle cx="-6" cy="4" r="1.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="0" cy="3" r="1.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="6" cy="4" r="1.5" fill="#ffffff" opacity="0.6"/>
  </g>
  
  <!-- Decorative flourishes -->
  <g stroke="url(#goldGradient)" stroke-width="1.5" fill="none" opacity="0.7">
    <!-- Left flourish -->
    <path d="M15 60 Q20 55 25 60 Q20 65 15 60" filter="url(#glow)"/>
    <path d="M10 55 Q12 57 14 55" />
    <path d="M10 65 Q12 63 14 65" />
    
    <!-- Right flourish -->
    <path d="M105 60 Q100 55 95 60 Q100 65 105 60" filter="url(#glow)"/>
    <path d="M110 55 Q108 57 106 55" />
    <path d="M110 65 Q108 63 106 65" />
  </g>
  
  <!-- Bottom decorative element - stylized plate -->
  <g transform="translate(60, 95)">
    <ellipse cx="0" cy="0" rx="20" ry="4" fill="url(#goldGradient)" opacity="0.6" filter="url(#glow)"/>
    <ellipse cx="0" cy="-1" rx="16" ry="3" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.8"/>
  </g>
  
  <!-- Subtle sparkle effects -->
  <g fill="url(#goldGradient)" opacity="0.6">
    <circle cx="25" cy="30" r="1">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="95" cy="35" r="1">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="90" r="1">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="85" r="1">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Inner decorative ring -->
  <circle cx="60" cy="60" r="45" fill="none" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.4" stroke-dasharray="2,3"/>
</svg>
